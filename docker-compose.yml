version: '1'

services:
  db:
    image: mariadb:10.5
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: studypjt
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci

  app:
    build: .
    container_name: egov-app
    depends_on:
      - db
    ports:
      - "8080:8080"